<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- Subtle noise texture -->
  <rect width="1200" height="630" fill="white" opacity="0.03"/>

  <!-- Large switch icon centered -->
  <g transform="translate(600, 250)">
    <circle r="80" fill="white" opacity="0.12"/>
    <circle r="56" fill="white" opacity="0.18"/>
    <!-- Bidirectional arrows, thick and readable -->
    <path d="M-22 -12 L0 -30 L22 -12 L12 -12 L12 6 L-12 6 L-12 -12 Z" fill="white" opacity="0.95"/>
    <path d="M-22 12 L0 30 L22 12 L12 12 L12 -6 L-12 -6 L-12 12 Z" fill="white" opacity="0.5"/>
  </g>

  <!-- Title — massive, readable at any size -->
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="900" fill="white">Multi-Account</text>

  <!-- Thin separator -->
  <rect x="480" y="430" width="240" height="3" rx="1.5" fill="white" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="600" y="490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="white" opacity="0.85">Swoogo AI Assistant</text>
</svg>
