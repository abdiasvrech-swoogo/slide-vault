        let currentSlideIndex = 0;

        function updateUI() {
            const slide = slides[currentSlideIndex];
            const content = document.getElementById('slide-content');
            const wrapper = document.getElementById('slide-content-wrapper');
            
            // Render Header title if slide has it
            let slideHTML = "";
            if(slide.title) {
                slideHTML = `
                    <div class="mb-10 slide-enter">
                        <h2 class="text-3xl md:text-5xl font-black text-slate-900 leading-tight tracking-tight">${slide.title}</h2>
                    </div>
                `;
            }
            content.innerHTML = slideHTML + slide.content;

            // Update footer info
            document.getElementById('slide-num').innerText = currentSlideIndex + 1;
            document.getElementById('progress-bar').style.width = `${((currentSlideIndex + 1) / slides.length) * 100}%`;

            // Update Dots
            const dotsContainer = document.getElementById('nav-dots');
            dotsContainer.innerHTML = slides.map((_, i) => `
                <button onclick="goToSlide(${i})" class="h-1.5 rounded-full transition-all duration-300 ${i === currentSlideIndex ? 'w-10 bg-indigo-600' : 'w-2 bg-slate-200 hover:bg-slate-300'}"></button>
            `).join('');
            
            wrapper.scrollTop = 0;
        }

        function nextSlide() {
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateUI();
            }
        }

        function goToSlide(i) {
            currentSlideIndex = i;
            updateUI();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        // Initialize
        updateUI();
    </script>
